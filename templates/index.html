<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园二手交易平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255,255,255,0.95);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a {
            text-decoration: none;
            color: #333;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .hero {
            max-width: 1200px;
            margin: 3rem auto;
            text-align: center;
            color: white;
            padding: 0 1rem;
        }
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .features {
            max-width: 1200px;
            margin: 3rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            padding: 0 1rem;
        }
        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-5px);
        }
        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .feature-card h3 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        .feature-card p {
            color: #666;
            font-size: 0.9rem;
        }
        .stats {
            max-width: 1200px;
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            gap: 3rem;
            padding: 0 1rem;
        }
        .stat-item {
            text-align: center;
            color: white;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .stat-label {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">校园二手交易平台</div>
            <div class="nav-links">
                <a href="/" class="active">首页</a>
                <a href="/items">商品列表</a>
                <a href="/users">用户列表</a>
                <a href="/orders">订单列表</a>
                <a href="/queries">查询功能</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>欢迎使用校园二手交易平台</h1>
        <p>方便快捷的校内二手物品交易系统</p>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-number" id="totalItems">-</div>
            <div class="stat-label">商品总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalUsers">-</div>
            <div class="stat-label">用户总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="totalOrders">-</div>
            <div class="stat-label">订单总数</div>
        </div>
    </div>

    <div class="features">
        <div class="feature-card">
            <div class="feature-icon">📦</div>
            <h3>商品浏览</h3>
            <p>浏览所有二手商品，支持分类筛选</p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">👥</div>
            <h3>用户管理</h3>
            <p>查看所有注册用户信息</p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">📋</div>
            <h3>订单管理</h3>
            <p>追踪所有交易订单</p>
        </div>
        <div class="feature-card">
            <div class="feature-icon">🔍</div>
            <h3>高级查询</h3>
            <p>支持多种查询条件，数据分析</p>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const [itemsRes, usersRes, ordersRes] = await Promise.all([
                    fetch('/api/items'),
                    fetch('/api/users'),
                    fetch('/api/orders')
                ]);
                const items = await itemsRes.json();
                const users = await usersRes.json();
                const orders = await ordersRes.json();

                document.getElementById('totalItems').textContent = items.length;
                document.getElementById('totalUsers').textContent = users.length;
                document.getElementById('totalOrders').textContent = orders.length;
            } catch (e) {
                console.error('加载统计数据失败:', e);
            }
        }
        loadStats();
    </script>
</body>
</html>
