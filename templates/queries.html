<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查询功能 - 校园二手交易平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">校园二手交易平台</a>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/items">商品列表</a>
                <a href="/users">用户列表</a>
                <a href="/orders">订单列表</a>
                <a href="/queries" class="active">查询功能</a>
            </div>
            <div class="nav-auth">
                {% if session.user_id %}
                <div class="user-menu">
                    <a href="/cart" style="font-size:1.25rem;" title="购物车">🛒</a>
                    <a href="/user/{{ session.user_id }}" class="user-avatar" title="{{ session.username }}">
                        {{ session.username[0] }}
                    </a>
                    <a href="/logout">退出</a>
                </div>
                {% else %}
                <a href="/login" class="btn-login">登录</a>
                <a href="/register" class="btn-register">注册</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 style="margin-bottom: 1.5rem;">查询功能</h1>

        <!-- 聚合统计 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalItems">-</div>
                <div class="stat-label">商品总数</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #48bb78, #38a169);">
                <div class="stat-value" id="avgPrice">-</div>
                <div class="stat-label">平均价格(元)</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #ed8936, #dd6b20);">
                <div class="stat-value" id="topSeller">-</div>
                <div class="stat-label">商品最多的用户</div>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #4299e1, #3182ce);">
                <div class="stat-value" id="topSellerCount">-</div>
                <div class="stat-label">发布商品数</div>
            </div>
        </div>

        <!-- 分类统计 -->
        <div class="card" style="margin-bottom: 2rem;">
            <div class="card-header">
                <h3>各类商品数量统计</h3>
            </div>
            <div class="card-body" id="categoryStats">
                <p style="color: #888;">加载中...</p>
            </div>
        </div>

        <!-- 查询按钮区 -->
        <div class="card" style="margin-bottom: 1.5rem;">
            <div class="card-header">
                <h3>基本查询</h3>
            </div>
            <div class="card-body">
                <div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                    <button class="btn btn-outline" onclick="queryUnsold()">未售出商品</button>
                    <button class="btn btn-outline" onclick="queryPriceAbove()">价格>30元</button>
                    <button class="btn btn-outline" onclick="queryCategory('生活用品')">生活用品</button>
                    <button class="btn btn-outline" onclick="queryCategory('电子产品')">电子产品</button>
                    <button class="btn btn-outline" onclick="queryCategory('学习资料')">学习资料</button>
                    <button class="btn btn-outline" onclick="queryBySeller('u001')">u001的商品</button>
                    <button class="btn btn-outline" onclick="queryBySeller('u002')">u002的商品</button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 1.5rem;">
            <div class="card-header">
                <h3>连接查询</h3>
            </div>
            <div class="card-body">
                <div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                    <button class="btn btn-outline" onclick="querySoldWithBuyer()">已售商品+买家</button>
                    <button class="btn btn-outline" onclick="queryOrderDetails()">订单详情</button>
                    <button class="btn btn-outline" onclick="querySellerStatus('u001')">u001销售状态</button>
                    <button class="btn btn-outline" onclick="querySellerStatus('u003')">u003销售状态</button>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 1.5rem;">
            <div class="card-header">
                <h3>视图查询</h3>
            </div>
            <div class="card-body">
                <div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                    <button class="btn btn-outline" onclick="viewSold()">已售商品视图</button>
                    <button class="btn btn-outline" onclick="viewUnsold()">未售商品视图</button>
                </div>
            </div>
        </div>

        <!-- 查询结果 -->
        <div class="card" id="resultSection" style="display: none;">
            <div class="card-header">
                <h3 id="resultTitle">查询结果</h3>
                <span id="resultCount" style="color: var(--primary-color);"></span>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table id="resultTable">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const [totalRes, avgRes, topRes, catRes] = await Promise.all([
                    fetch('/api/stats/total_items'),
                    fetch('/api/stats/avg_price'),
                    fetch('/api/stats/top_seller'),
                    fetch('/api/stats/category_count')
                ]);

                const total = await totalRes.json();
                const avg = await avgRes.json();
                const top = await topRes.json();
                const cats = await catRes.json();

                document.getElementById('totalItems').textContent = total.total;
                document.getElementById('avgPrice').textContent = avg.avg_price || 0;
                document.getElementById('topSeller').textContent = top.username || '-';
                document.getElementById('topSellerCount').textContent = top.item_count || 0;

                // 渲染分类统计
                const catContainer = document.getElementById('categoryStats');
                if (cats.length === 0) {
                    catContainer.innerHTML = '<p style="color: #888;">暂无数据</p>';
                    return;
                }

                const maxCount = Math.max(...cats.map(c => c.count), 1);
                catContainer.innerHTML = cats.map(cat => `
                    <div style="display: flex; align-items: center; gap: 1rem; margin: 0.5rem 0;">
                        <span style="width: 100px;">${cat.category}</span>
                        <div style="flex: 1; background: var(--light-gray); height: 24px; border-radius: 12px; overflow: hidden;">
                            <div style="width: ${(cat.count / maxCount) * 100}%; background: linear-gradient(90deg, var(--primary-color), var(--secondary-color)); height: 100%;"></div>
                        </div>
                        <span style="font-weight: bold; color: var(--primary-color); width: 30px;">${cat.count}</span>
                    </div>
                `).join('');
            } catch (e) {
                console.error('加载统计数据失败:', e);
            }
        }

        // 显示结果
        function showResult(title, data, columns) {
            const section = document.getElementById('resultSection');
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultCount').textContent = `${data.length} 条记录`;
            section.style.display = 'block';

            const thead = document.querySelector('#resultTable thead');
            const tbody = document.querySelector('#resultTable tbody');

            thead.innerHTML = `<tr>${columns.map(c => `<th>${c}</th>`).join('')}</tr>`;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="' + columns.length + '" style="text-align: center; color: #888; padding: 2rem;">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => {
                return '<tr>' + columns.map((c, i) => {
                    let val = item[Object.keys(item)[i]];
                    if (val === null || val === undefined) val = '-';
                    if (typeof val === 'number' && c.includes('价格')) val = '¥' + val.toFixed(2);
                    if (typeof val === 'number' && c.includes('状态')) val = val === 0 ? '未售' : '已售';
                    return `<td>${val}</td>`;
                }).join('') + '</tr>';
            }).join('');

            section.scrollIntoView({ behavior: 'smooth' });
        }

        // 基本查询
        async function queryUnsold() {
            const res = await fetch('/api/query/unsold');
            const data = await res.json();
            showResult('未售出商品', data, ['item_id', 'item_name', 'price', 'category', 'seller_id']);
        }

        async function queryPriceAbove() {
            const res = await fetch('/api/query/price_above/30');
            const data = await res.json();
            showResult('价格大于30元的商品', data, ['item_id', 'item_name', 'price', 'category', 'status']);
        }

        async function queryCategory(cat) {
            const res = await fetch(`/api/query/category/${encodeURIComponent(cat)}`);
            const data = await res.json();
            showResult(`"${cat}"类商品`, data, ['item_id', 'item_name', 'price', 'seller_id', 'status']);
        }

        async function queryBySeller(sellerId) {
            const res = await fetch(`/api/query/seller/${sellerId}`);
            const data = await res.json();
            showResult(`卖家 ${sellerId} 的商品`, data, ['item_id', 'item_name', 'price', 'category', 'status']);
        }

        // 连接查询
        async function querySoldWithBuyer() {
            const res = await fetch('/api/query/sold_with_buyer');
            const data = await res.json();
            showResult('已售商品及其买家', data, ['item_id', 'item_name', 'price', 'buyer_name']);
        }

        async function queryOrderDetails() {
            const res = await fetch('/api/query/order_details');
            const data = await res.json();
            showResult('订单详情（商品名+买家+日期）', data, ['order_id', 'item_name', 'buyer_name', 'order_date']);
        }

        async function querySellerStatus(sellerId) {
            const res = await fetch(`/api/query/seller_sold_status/${sellerId}`);
            const data = await res.json();
            showResult(`卖家 ${sellerId} 商品销售状态`, data, ['item_id', 'item_name', 'sale_status', 'buyer_id']);
        }

        // 视图查询
        async function viewSold() {
            const res = await fetch('/api/view/sold');
            const data = await res.json();
            showResult('已售商品视图', data, ['item_id', 'item_name', 'price', 'category', 'buyer_id']);
        }

        async function viewUnsold() {
            const res = await fetch('/api/view/unsold');
            const data = await res.json();
            showResult('未售商品视图', data, ['item_id', 'item_name', 'price', 'category', 'seller_id']);
        }

        loadStats();
    </script>
</body>
</html>
