<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品列表 - 校园二手交易平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .navbar {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a {
            text-decoration: none;
            color: #333;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .header h1 {
            color: #333;
        }
        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5568d3;
        }
        .btn-success {
            background: #48bb78;
            color: white;
        }
        .btn-danger {
            background: #f56565;
            color: white;
        }
        .btn-sm {
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
        }
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .item-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        .item-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        .item-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
        }
        .item-status {
            padding: 0.25rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-unsold {
            background: #c6f6d5;
            color: #276749;
        }
        .status-sold {
            background: #fed7d7;
            color: #c53030;
        }
        .item-price {
            font-size: 1.5rem;
            color: #667eea;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        .item-category {
            display: inline-block;
            background: #edf2f7;
            color: #4a5568;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .item-desc {
            color: #666;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
        .item-seller {
            color: #888;
            font-size: 0.85rem;
            margin-top: 1rem;
            padding-top: 0.5rem;
            border-top: 1px solid #eee;
        }
        .item-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
        }
        .modal h2 {
            margin-bottom: 1.5rem;
            color: #333;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 2000;
        }
        .toast.success { background: #48bb78; }
        .toast.error { background: #f56565; }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">校园二手交易平台</div>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/items" class="active">商品列表</a>
                <a href="/users">用户列表</a>
                <a href="/orders">订单列表</a>
                <a href="/queries">查询功能</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>商品列表</h1>
            <div>
                <button class="btn btn-primary" onclick="openAddModal()">添加商品</button>
            </div>
        </div>
        <div class="items-grid" id="itemsGrid">
            <!-- 商品卡片将通过JS加载 -->
        </div>
    </div>

    <!-- 添加商品弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h2>添加新商品</h2>
            <form id="addForm">
                <div class="form-group">
                    <label>商品名称</label>
                    <input type="text" name="item_name" required>
                </div>
                <div class="form-group">
                    <label>价格 (元)</label>
                    <input type="number" name="price" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select name="category" required>
                        <option value="学习资料">学习资料</option>
                        <option value="电子产品">电子产品</option>
                        <option value="生活用品">生活用品</option>
                        <option value="交通工具">交通工具</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea name="description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>卖家ID</label>
                    <select name="seller_id" required>
                        <option value="u001">u001 - 张三</option>
                        <option value="u002">u002 - 李四</option>
                        <option value="u003">u003 - 王五</option>
                        <option value="u004">u004 - 赵六</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="closeAddModal()">取消</button>
                    <button type="submit" class="btn btn-primary">添加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 修改价格弹窗 -->
    <div class="modal" id="priceModal">
        <div class="modal-content">
            <h2>修改商品价格</h2>
            <form id="priceForm">
                <input type="hidden" name="item_id" id="priceItemId">
                <div class="form-group">
                    <label>商品名称</label>
                    <input type="text" id="priceItemName" disabled>
                </div>
                <div class="form-group">
                    <label>新价格 (元)</label>
                    <input type="number" name="price" step="0.01" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="closePriceModal()">取消</button>
                    <button type="submit" class="btn btn-primary">修改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 购买弹窗 -->
    <div class="modal" id="buyModal">
        <div class="modal-content">
            <h2>购买商品</h2>
            <form id="buyForm">
                <input type="hidden" name="item_id" id="buyItemId">
                <div class="form-group">
                    <label>商品名称</label>
                    <input type="text" id="buyItemName" disabled>
                </div>
                <div class="form-group">
                    <label>价格</label>
                    <input type="text" id="buyItemPrice" disabled>
                </div>
                <div class="form-group">
                    <label>买家ID</label>
                    <select name="buyer_id" required>
                        <option value="u001">u001 - 张三</option>
                        <option value="u002">u002 - 李四</option>
                        <option value="u003">u003 - 王五</option>
                        <option value="u004">u004 - 赵六</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn" onclick="closeBuyModal()">取消</button>
                    <button type="submit" class="btn btn-success">确认购买</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let items = [];

        async function loadItems() {
            try {
                const res = await fetch('/api/items');
                items = await res.json();
                renderItems();
            } catch (e) {
                showToast('加载商品失败', 'error');
            }
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            grid.innerHTML = items.map(item => `
                <div class="item-card">
                    <div class="item-header">
                        <div class="item-name">${item.item_name}</div>
                        <span class="item-status ${item.status === 0 ? 'status-unsold' : 'status-sold'}">
                            ${item.status === 0 ? '未售出' : '已售出'}
                        </span>
                    </div>
                    <div class="item-price">¥${item.price.toFixed(2)}</div>
                    <span class="item-category">${item.category}</span>
                    <p class="item-desc">${item.description || '暂无描述'}</p>
                    <div class="item-seller">卖家: ${item.seller_name || item.seller_id}</div>
                    <div class="item-actions">
                        ${item.status === 0 ? `
                            <button class="btn btn-success btn-sm" onclick="openBuyModal('${item.item_id}', '${item.item_name}', ${item.price})">购买</button>
                            <button class="btn btn-primary btn-sm" onclick="openPriceModal('${item.item_id}', '${item.item_name}')">改价</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteItem('${item.item_id}')">删除</button>
                        ` : '<span style="color:#888;">已售出</span>'}
                    </div>
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('addForm').reset();
        }

        function openPriceModal(itemId, itemName) {
            document.getElementById('priceItemId').value = itemId;
            document.getElementById('priceItemName').value = itemName;
            document.getElementById('priceModal').classList.add('active');
        }

        function closePriceModal() {
            document.getElementById('priceModal').classList.remove('active');
            document.getElementById('priceForm').reset();
        }

        function openBuyModal(itemId, itemName, price) {
            document.getElementById('buyItemId').value = itemId;
            document.getElementById('buyItemName').value = itemName;
            document.getElementById('buyItemPrice').value = '¥' + price.toFixed(2);
            document.getElementById('buyModal').classList.add('active');
        }

        function closeBuyModal() {
            document.getElementById('buyModal').classList.remove('active');
            document.getElementById('buyForm').reset();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const res = await fetch('/api/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    showToast('商品添加成功');
                    closeAddModal();
                    loadItems();
                } else {
                    showToast(result.error || '添加失败', 'error');
                }
            } catch (e) {
                showToast('添加失败', 'error');
            }
        });

        document.getElementById('priceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const itemId = formData.get('item_id');
            const price = formData.get('price');

            try {
                const res = await fetch(`/api/items/${itemId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ price })
                });
                const result = await res.json();

                if (result.success) {
                    showToast('价格修改成功');
                    closePriceModal();
                    loadItems();
                } else {
                    showToast(result.error || '修改失败', 'error');
                }
            } catch (e) {
                showToast('修改失败', 'error');
            }
        });

        document.getElementById('buyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                item_id: formData.get('item_id'),
                buyer_id: formData.get('buyer_id')
            };

            try {
                const res = await fetch('/api/buy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();

                if (result.success) {
                    showToast('购买成功！订单号: ' + result.order_id);
                    closeBuyModal();
                    loadItems();
                } else {
                    showToast(result.error || '购买失败', 'error');
                }
            } catch (e) {
                showToast('购买失败', 'error');
            }
        });

        async function deleteItem(itemId) {
            if (!confirm('确定要删除这个商品吗？')) return;

            try {
                const res = await fetch(`/api/items/${itemId}`, { method: 'DELETE' });
                const result = await res.json();

                if (result.success) {
                    showToast('删除成功');
                    loadItems();
                } else {
                    showToast(result.error || '删除失败', 'error');
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }

        loadItems();
    </script>
</body>
</html>
